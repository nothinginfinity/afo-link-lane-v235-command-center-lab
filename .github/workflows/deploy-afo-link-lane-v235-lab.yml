name: Deploy AFO Link Lane v235 Lab

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Expected Worker VERSION value to deploy
        required: true
        default: 2.3.20.0-node-chat-content-visor
      confirm:
        description: Type DEPLOY to confirm this manual lab deploy
        required: true
        default: DEPLOY

permissions:
  contents: read

concurrency:
  group: afo-link-lane-v235-lab-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Manual lab Worker deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EXPECTED_VERSION: ${{ inputs.expected_version }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      WORKER_CF_BROWSER_RENDERING_API_TOKEN: ${{ secrets.CF_BROWSER_RENDERING_API_TOKEN }}
      HEALTH_URL: https://afo-link-lane-v235-lab.jaredtechfit.workers.dev/health
      VECTOR_INDEX: afo-link-lane-v235-lab-resources-v1
      D1_DATABASE: afo-link-lane-v235-lab-db
    steps:
      - name: Check manual confirmation
        shell: bash
        run: |
          if [ "${{ inputs.confirm }}" != "DEPLOY" ]; then
            echo "Manual confirmation must be DEPLOY"
            exit 1
          fi

      - name: Check required deploy secrets
        shell: bash
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler and PDF tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          cd apps/afo-link-lane
          npm install

      - name: Validate Worker and retrieval module
        working-directory: apps/afo-link-lane
        shell: bash
        run: |
          node --check worker.js
          node --check resource-retrieval.js
          node --check resource-retrieval-quality.js
          node --check resource-node-chat.js
          bash -n scripts/rebuild-financial-aid-quality.sh
          bash -n scripts/verify-resource-retrieval.sh
          node -e "import('./resource-retrieval-quality.js').then(m=>{for(const k of ['apiIndexPilotResources','apiQueryPilotResource','apiBrowserQueryPilotResource','apiPilotRetrievalStatus','VECTOR_INDEX_NAME','RANKING_VERSION','ANSWER_MODE'])if(!(k in m))throw new Error('Missing export '+k);if(m.RANKING_VERSION!=='hybrid-vector-lexical-v1'||m.ANSWER_MODE!=='extractive-evidence-v1')throw new Error('Unexpected quality module metadata');console.log('Retrieval quality module exports verified')})"
          node -e "import('./resource-node-chat.js').then(m=>{for(const k of ['apiNodeChatTurn','CHAT_MODE','CHAT_MODEL','MAX_TURNS','signContext','verifyContext'])if(!(k in m))throw new Error('Missing export '+k);if(m.CHAT_MODE!=='grounded-synthesis-v1')throw new Error('Unexpected chat mode metadata');if(typeof m.MAX_TURNS!=='number'||m.MAX_TURNS<1)throw new Error('Unexpected MAX_TURNS');console.log('Node-chat module exports verified')})"

      - name: Assert Worker version
        working-directory: apps/afo-link-lane
        shell: bash
        run: |
          node -e "const fs=require('fs');const expected=process.env.EXPECTED_VERSION;const src=fs.readFileSync('worker.js','utf8');const match=src.match(/const VERSION\\s*=\\s*\"([^\"]+)\"/);if(!match)throw new Error('VERSION not found');console.log('Worker VERSION='+match[1]);if(match[1]!==expected)throw new Error('Expected '+expected+' but found '+match[1]);"

      - name: Provision Vectorize metadata and D1 chunk ledger
        working-directory: apps/afo-link-lane
        shell: bash
        run: bash scripts/provision-resource-retrieval.sh

      - name: Refresh Worker secrets
        working-directory: apps/afo-link-lane
        shell: bash
        run: |
          if [ -n "${WORKER_CF_ACCOUNT_ID}" ]; then
            printf '%s' "${WORKER_CF_ACCOUNT_ID}" | npx wrangler secret put CF_ACCOUNT_ID --config wrangler.jsonc
          else
            echo "Skipping CF_ACCOUNT_ID secret refresh"
          fi
          if [ -n "${WORKER_CF_BROWSER_RENDERING_API_TOKEN}" ]; then
            printf '%s' "${WORKER_CF_BROWSER_RENDERING_API_TOKEN}" | npx wrangler secret put CF_BROWSER_RENDERING_API_TOKEN --config wrangler.jsonc
          else
            echo "Skipping CF_BROWSER_RENDERING_API_TOKEN secret refresh"
          fi
          LAB_INGEST_TOKEN="$(openssl rand -hex 32)"
          echo "::add-mask::${LAB_INGEST_TOKEN}"
          printf '%s' "${LAB_INGEST_TOKEN}" | npx wrangler secret put LAB_INGEST_TOKEN --config wrangler.jsonc
          echo "LAB_INGEST_TOKEN=${LAB_INGEST_TOKEN}" >> "${GITHUB_ENV}"

      - name: Deploy lab Worker
        working-directory: apps/afo-link-lane
        shell: bash
        run: npx wrangler deploy --config wrangler.jsonc

      - name: Verify public workers.dev route and version
        shell: bash
        run: |
          set -euo pipefail
          READY=0
          for ATTEMPT in $(seq 1 24)
          do
            HTTP_CODE="$(curl -sS --connect-timeout 10 --max-time 30 -o /tmp/public-health.txt -w '%{http_code}' "${HEALTH_URL}" || true)"
            echo "Public health attempt ${ATTEMPT}: HTTP ${HTTP_CODE}"
            cat /tmp/public-health.txt || true
            if [ "${HTTP_CODE}" = "200" ]; then
              HEALTH_JSON="$(cat /tmp/public-health.txt)"
              if HEALTH_JSON="${HEALTH_JSON}" node -e "const data=JSON.parse(process.env.HEALTH_JSON);if(data.version!==process.env.EXPECTED_VERSION)throw new Error('Unexpected public live version '+data.version);if(data.resource_retrieval?.browser_route!=='/api/resource-retrieval/query'||data.resource_retrieval?.browser_allowlist_size!==5)throw new Error('Browser retrieval health metadata missing');if(data.resource_retrieval?.chunker_version!=='pdf-page-v2-reading-order'||data.resource_retrieval?.normalizer!=='pdf-reading-order-v2'||data.resource_retrieval?.ranking_version!=='hybrid-vector-lexical-v1'||data.resource_retrieval?.answer_mode!=='extractive-evidence-v1')throw new Error('Public answer-quality metadata missing');console.log('Public live version, browser route, and answer quality verified: '+data.version);"; then
                READY=1
                break
              fi
            fi
            sleep 5
          done
          if [ "${READY}" != "1" ]; then
            echo "Public lab route never exposed the expected iPhone retrieval build"
            exit 1
          fi

      - name: Legacy PDF recapture disabled for retrieval-only slice
        if: ${{ false }}
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="${HEALTH_URL%/health}"
          mkdir -p /tmp/financial-aid-pilot
          while IFS='|' read -r RESOURCE_ID SOURCE_URL
          do
            [ -n "${RESOURCE_ID}" ] || continue
            PDF_PATH="/tmp/financial-aid-pilot/${RESOURCE_ID}.pdf"
            TXT_PATH="/tmp/financial-aid-pilot/${RESOURCE_ID}.txt"
            PAYLOAD_PATH="/tmp/financial-aid-pilot/${RESOURCE_ID}.json"
            curl -fL --retry 3 --retry-all-errors --connect-timeout 20 --max-time 180 \
              -A 'Mozilla/5.0 (compatible; AFOLinkLaneLabExtraction/1.0)' \
              "${SOURCE_URL}" -o "${PDF_PATH}"
            if [ "$(head -c 5 "${PDF_PATH}")" != "%PDF-" ]; then
              echo "Downloaded resource is not a PDF: ${RESOURCE_ID}"
              exit 1
            fi
            ACTUAL_SHA="$(sha256sum "${PDF_PATH}" | awk '{print $1}')"
            CAPTURE_JSON="$(curl -fsS -X POST "${BASE_URL}/admin/store-pilot-pdf?resource_id=${RESOURCE_ID}" \
              -H "Content-Type: application/pdf" \
              -H "X-Lab-Ingest-Token: ${LAB_INGEST_TOKEN}" \
              --data-binary "@${PDF_PATH}")"
            echo "${CAPTURE_JSON}"
            SOURCE_SHA="$(CAPTURE_JSON="${CAPTURE_JSON}" RESOURCE_ID="${RESOURCE_ID}" ACTUAL_SHA="${ACTUAL_SHA}" node -e "const d=JSON.parse(process.env.CAPTURE_JSON);if(!d.ok||d.resource_id!==process.env.RESOURCE_ID||d.sha256!==process.env.ACTUAL_SHA||d.capture_method!=='authenticated-binary-upload')throw new Error('Invalid PDF storage response');process.stdout.write(d.sha256);")"
            PAGE_COUNT="$(pdfinfo "${PDF_PATH}" | awk -F: '/^Pages:/{gsub(/ /,"",$2);print $2}')"
            pdftotext -layout "${PDF_PATH}" "${TXT_PATH}"
            TEXT_SHA="$(sha256sum "${TXT_PATH}" | awk '{print $1}')"
            RESOURCE_ID="${RESOURCE_ID}" SOURCE_SHA="${SOURCE_SHA}" TEXT_SHA="${TEXT_SHA}" PAGE_COUNT="${PAGE_COUNT}" TXT_PATH="${TXT_PATH}" PAYLOAD_PATH="${PAYLOAD_PATH}" python3 - <<'PY'
          import json, os
          from pathlib import Path
          payload = {
              "resource_id": os.environ["RESOURCE_ID"],
              "source_sha256": os.environ["SOURCE_SHA"],
              "text_sha256": os.environ["TEXT_SHA"],
              "page_count": int(os.environ["PAGE_COUNT"]),
              "text": Path(os.environ["TXT_PATH"]).read_text(encoding="utf-8"),
          }
          Path(os.environ["PAYLOAD_PATH"]).write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          PY
            TEXT_JSON="$(curl -fsS -X POST "${BASE_URL}/admin/store-pilot-text" \
              -H "Content-Type: application/json" \
              -H "X-Lab-Ingest-Token: ${LAB_INGEST_TOKEN}" \
              --data-binary "@${PAYLOAD_PATH}")"
            echo "${TEXT_JSON}"
            TEXT_JSON="${TEXT_JSON}" RESOURCE_ID="${RESOURCE_ID}" SOURCE_SHA="${SOURCE_SHA}" TEXT_SHA="${TEXT_SHA}" PAGE_COUNT="${PAGE_COUNT}" node -e "const d=JSON.parse(process.env.TEXT_JSON);if(!d.ok||d.resource_id!==process.env.RESOURCE_ID||d.source_sha256!==process.env.SOURCE_SHA||d.text_sha256!==process.env.TEXT_SHA||d.page_count!==Number(process.env.PAGE_COUNT))throw new Error('Invalid text storage response');console.log('Stored '+d.resource_id+' -> '+d.text_key);"
          done <<'EOF'
          fat-do-you-need-money-pdf|https://studentaid.gov/sites/default/files/do-you-need-money.pdf
          fat-money-management-checklist-pdf|https://studentaid.gov/sites/default/files/money-management-checklist.pdf
          fat-pslf-infographic-pdf|https://studentaid.gov/sites/default/files/pslf-infographic.pdf
          fat-how-financial-aid-works-graphic|https://studentaid.gov/sites/default/files/how-financial-aid-works.pdf
          fat-federal-student-loan-graphic|https://studentaid.gov/sites/default/files/get-loan.pdf
          EOF

      - name: Rebuild five pilot resources in reading order
        working-directory: apps/afo-link-lane
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/rebuild-financial-aid-quality.sh

      - name: Verify five-resource node-local answer quality
        working-directory: apps/afo-link-lane
        shell: bash
        run: |
          set -euo pipefail
          printf 'LAB_INGEST_TOKEN="%s"\n' "${LAB_INGEST_TOKEN}" > .dev.vars
          npx wrangler dev --remote --port 8787 --config wrangler.jsonc > /tmp/wrangler-remote.log 2>&1 &
          WRANGLER_PID=$!
          cleanup(){ kill "${WRANGLER_PID}" >/dev/null 2>&1 || true; rm -f .dev.vars; }
          trap cleanup EXIT
          READY=0
          for ATTEMPT in $(seq 1 60)
          do
            if curl -fsS http://127.0.0.1:8787/health >/tmp/remote-health.json 2>/dev/null; then
              READY=1
              break
            fi
            if ! kill -0 "${WRANGLER_PID}" >/dev/null 2>&1; then
              cat /tmp/wrangler-remote.log
              exit 1
            fi
            sleep 2
          done
          if [ "${READY}" != "1" ]; then
            cat /tmp/wrangler-remote.log
            exit 1
          fi
          cat /tmp/remote-health.json
          export HEALTH_URL=http://127.0.0.1:8787/health
          bash scripts/verify-resource-retrieval.sh
          echo "Wrangler remote runtime log tail:"
          tail -n 80 /tmp/wrangler-remote.log || true

      - name: Verify public live UI and browser-safe node-local answer quality
        working-directory: apps/afo-link-lane
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/verify-resource-retrieval.sh
